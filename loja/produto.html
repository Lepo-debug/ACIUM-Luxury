<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador Luxury | ACIUM</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="css/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { --gold: #d4af37; --bg-card: #ffffff; --text-color: #212529; --border-color: #dee2e6; }
        [data-theme="dark"] { --bg-card: #1e1e1e; --text-color: #f8f9fa; --border-color: #333; background-color: #121212; }
        body { background-color: #f8f9fa; color: var(--text-color); transition: 0.3s; font-family: 'Inter', sans-serif; }
        [data-theme="dark"] body { background-color: #121212; }

        .preview-box { 
            background-color: var(--bg-card); 
            border-radius: 20px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            border: 1px solid var(--border-color);
        }

        .main-img { max-height: 450px; max-width: 90%; object-fit: contain; transition: transform 0.5s ease; }
        .preview-box:hover .main-img { transform: scale(1.05); }

        .option-card { 
            cursor: pointer; 
            border: 2px solid var(--border-color); 
            border-radius: 15px; 
            padding: 12px; 
            transition: 0.3s; 
            background: var(--bg-card);
        }
        
        .option-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .option-card.active { border-color: var(--gold) !important; background-color: rgba(212, 175, 55, 0.08) !important; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .thumb-img { width: 100%; height: 70px; object-fit: cover; border-radius: 10px; }
        
        .btn-gold { background: linear-gradient(135deg, #d4af37, #b8962e); color: white; font-weight: bold; border: none; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3); color: white; }

        .price-badge { background-color: var(--bg-card); border-left: 5px solid var(--gold); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <a href="index.html" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
            <i class="bi bi-chevron-left"></i> <span data-t="btnVoltar">Coleções</span>
        </a>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-warning btn-sm rounded-circle" onclick="toggleTheme()" id="themeBtn" style="width: 35px; height: 35px;">
                <i class="bi bi-moon-stars"></i>
            </button>
            <button class="btn btn-outline-secondary btn-sm fw-bold px-3 rounded-pill" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>
    </div>

    <div class="row g-5 align-items-center">
        <div class="col-lg-7">
            <div class="preview-box shadow-sm">
                <img id="displayImg" src="" class="main-img" alt="Jewelry View">
            </div>
        </div>

        <div class="col-lg-5">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small text-uppercase" id="catText">Coleção Exclusiva</li>
                </ol>
            </nav>
            <h1 id="nomeText" class="display-5 fw-bold mb-4">...</h1>
            
            <p id="labelEscolha" class="text-muted fw-bold small mb-3 text-uppercase">Escolha o seu design:</p>
            
            <div class="row g-3 mb-5">
                <div class="col-4">
                    <div id="optAnel" class="option-card active text-center" onclick="mudarOpcao('Anel')">
                        <img id="thumbAnel" src="" class="thumb-img mb-2">
                        <span class="small fw-bold" data-t="labelAnel">Anel</span>
                    </div>
                </div>
                <div class="col-4">
                    <div id="optColar" class="option-card text-center" onclick="mudarOpcao('Colar')">
                        <img id="thumbColar" src="" class="thumb-img mb-2">
                        <span class="small fw-bold" data-t="labelColar">Colar</span>
                    </div>
                </div>
                <div class="col-4">
                    <div id="optBrinco" class="option-card text-center" onclick="mudarOpcao('Brinco')">
                        <img id="thumbBrinco" src="" class="thumb-img mb-2">
                        <span class="small fw-bold" data-t="labelBrincos">Brincos</span>
                    </div>
                </div>
            </div>

            <div class="price-badge mb-4">
                <span id="labelPreco" class="text-muted d-block small fw-bold mb-1 text-uppercase">Valor da Joia</span>
                <h2 id="precoText" class="fw-bold mb-0" style="color: var(--gold);">€ 0.00</h2>
            </div>

            <button id="btnBuy" class="btn btn-gold btn-lg w-100 rounded-pill py-3 mb-3" onclick="finalizarCompra()">
                <i class="bi bi-bag-plus me-2"></i> ADICIONAR AO CARRINHO
            </button>
            
            <div class="d-flex justify-content-center gap-4 text-muted small">
                <span><i class="bi bi-truck me-1"></i> <span data-t="envio">Envio Prioritário</span></span>
                <span><i class="bi bi-shield-check me-1"></i> <span data-t="garantia">Garantia Vitalícia</span></span>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBwpLBa-3m3s7Ft7edmPZiAVg1nUSAOObI",
        authDomain: "pap-ri.firebaseapp.com",
        projectId: "pap-ri",
        storageBucket: "pap-ri.firebasestorage.app",
        messagingSenderId: "533502917027",
        appId: "1:533502917027:web:a58589d8e28ea1c45d8216"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    let dadosJoia = null;
    let selecionado = "Anel";
    let currentLang = localStorage.getItem('lang') || 'pt';

    const i18n = {
        pt: { 
            btnVoltar: "Coleções", escolha: "Escolha o seu design:", preco: "Valor da Joia", comprar: "ADICIONAR AO CARRINHO", 
            labelAnel: "Anel", labelColar: "Colar", labelBrincos: "Brincos", 
            envio: "Envio Prioritário", garantia: "Garantia Vitalícia",
            msgLogin: "Por favor, faça login para continuar.", msgAdd: "Joia adicionada ao seu carrinho!" 
        },
        en: { 
            btnVoltar: "Collections", escolha: "Choose your design:", preco: "Jewelry Value", comprar: "ADD TO CART", 
            labelAnel: "Ring", labelColar: "Necklace", labelBrincos: "Earrings", 
            envio: "Priority Shipping", garantia: "Lifetime Warranty",
            msgLogin: "Please login to proceed.", msgAdd: "Jewel added to your cart!" 
        }
    };

    window.toggleLanguage = () => {
        currentLang = currentLang === 'pt' ? 'en' : 'pt';
        localStorage.setItem('lang', currentLang);
        atualizarIdiomas();
        atualizarTela(); // Atualiza categoria se houver mapeamento
    };

    function atualizarIdiomas() {
        const t = i18n[currentLang];
        document.getElementById('langBtn').innerText = currentLang === 'pt' ? 'EN' : 'PT';
        document.getElementById('labelEscolha').innerText = t.escolha;
        document.getElementById('labelPreco').innerText = t.preco;
        document.getElementById('btnBuy').innerHTML = `<i class="bi bi-bag-plus me-2"></i> ${t.comprar}`;
        
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if(t[key]) el.innerText = t[key];
        });
    }

    window.toggleTheme = () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const novoTema = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', novoTema);
        localStorage.setItem('theme', novoTema);
        document.getElementById('themeBtn').innerHTML = novoTema === 'dark' ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
    };

    async function carregar() {
        if (!id) return window.location.href = "index.html";
        const snap = await getDoc(doc(db, "joias", id));
        if (snap.exists()) {
            dadosJoia = snap.data();
            document.getElementById("nomeText").innerText = dadosJoia.nome;
            
            // Substitui termos antigos por algo mais elegante
            const catLimpa = dadosJoia.categoria.replace("Bruto", "Gema Natural").replace("Raro", "Edição Limitada");
            document.getElementById("catText").innerText = `${catLimpa}`;
            
            document.getElementById("thumbAnel").src = dadosJoia.imgAnel || dadosJoia.imagem;
            document.getElementById("thumbColar").src = dadosJoia.imgColar || dadosJoia.imagem;
            document.getElementById("thumbBrinco").src = dadosJoia.imgBrinco || dadosJoia.imagem;
            
            atualizarTela();
        }
    }

    window.mudarOpcao = (tipo) => {
        selecionado = tipo;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
        document.getElementById('opt' + tipo).classList.add('active');
        atualizarTela();
    };

    function atualizarTela() {
        if (!dadosJoia) return;
        const img = document.getElementById("displayImg");
        const preco = document.getElementById("precoText");
        
        const campoImg = "img" + selecionado;
        const campoPreco = "preco" + selecionado;
        
        img.style.opacity = "0.5";
        setTimeout(() => {
            img.src = dadosJoia[campoImg] || dadosJoia.imagem;
            img.style.opacity = "1";
        }, 150);

        const valor = dadosJoia[campoPreco] || 0;
        preco.innerText = "€ " + valor.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    window.finalizarCompra = () => {
        if (!auth.currentUser) {
            alert(i18n[currentLang].msgLogin);
            return;
        }

        let carrinho = JSON.parse(localStorage.getItem("carrinhoLuxury")) || [];
        const itemID = `${id}_${selecionado}`;
        const precoFinal = dadosJoia["preco" + selecionado] || 0;
        const imgFinal = dadosJoia["img" + selecionado] || dadosJoia.imagem;
        const nomeTipo = i18n[currentLang]["label" + (selecionado === "Brinco" ? "Brincos" : selecionado)];

        const existente = carrinho.find(item => item.id === itemID);
        if (existente) {
            existente.qtd++;
        } else {
            carrinho.push({ 
                id: itemID, 
                nome: `${dadosJoia.nome} (${nomeTipo})`, 
                preco: precoFinal, 
                imagem: imgFinal, 
                qtd: 1 
            });
        }

        localStorage.setItem("carrinhoLuxury", JSON.stringify(carrinho));
        alert(i18n[currentLang].msgAdd);
        window.location.href = "carrinho.html";
    };

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    if(savedTheme === 'dark') document.getElementById('themeBtn').innerHTML = '<i class="bi bi-sun"></i>';
    
    atualizarIdiomas();
    carregar();
</script>
</body>
</html>
